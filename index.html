<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids English Learning Pro</title>

<style>
body{
margin:0;
font-family: Arial;
background:#f4f7ff;
}

header{
background:#1e3a8a;
color:white;
text-align:center;
padding:15px;
}

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
background:#2563eb;
}

nav button{
margin:5px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#60a5fa;
color:white;
cursor:pointer;
font-weight:bold;
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:18px;
margin-top:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.lesson{
background:#fff7ed;
padding:12px;
border-left:5px solid #f59e0b;
margin-bottom:15px;
}

.option{
display:block;
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:10px;
background:#eee;
cursor:pointer;
font-size:16px;
}

.option:hover{background:#d1fae5;}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}

.small{
font-size:14px;
opacity:0.85;
}
</style>

</head>

<body>

<header>
<h2>🎓 Kids English Learning (Teacher Mode)</h2>
<p>বাংলা → বুঝো → Practice → Master</p>
</header>

<nav>
<button onclick="load('verb')">Verb</button>
<button onclick="load('wh')">WH</button>
<button onclick="load('prep')">Preposition</button>
</nav>

<div class="container">
<div id="app" class="card"></div>
</div>

<script>

let state={
topic:"verb",
step:0,
qIndex:0
};

const DATA={

verb:{
lesson:[
"📘 Right Form of Verb মানে হলো sentence অনুযায়ী verb-এর সঠিক রূপ ব্যবহার করা।",
"",
"👉 Verb হলো কাজের নাম:",
"play = খেলা | go = যাওয়া | eat = খাওয়া",
"",
"👉 Sentence-এ subject (কে কাজ করছে) দেখে verb বদলায়"
],

rule:[
"🟡 Rule 1:",
"He / She / It থাকলে verb + s/es হয়",
"",
"📌 কেন?",
"একজন ব্যক্তি/একটা জিনিস হলে ইংরেজিতে verb পরিবর্তন হয়"
],

examples:[
"✔ He goes to school",
"✔ She reads book",
"✔ The cat eats fish"
],

sRule:[
"🟠 কখন 's' লাগে?",
"play → plays",
"read → reads",
"eat → eats"
],

esRule:[
"🔴 কখন 'es' লাগে?",
"যদি verb শেষে থাকে: s / sh / ch / x / o",
"",
"go → goes",
"watch → watches",
"wash → washes",
"fix → fixes"
],

questions:[
{
q:"He ___ to school every day",
o:["go","goes","going"],
a:"goes",
why:"He আছে → তাই verb + s/es লাগে → go → goes"
},
{
q:"She ___ books",
o:["read","reads","reading"],
a:"reads",
why:"She আছে → reads হবে"
}
]
},

wh:{
lesson:[
"❓ WH Question দিয়ে তথ্য জানা হয়",
"Who = মানুষ | What = জিনিস | Where = জায়গা"
],
examples:[
"✔ What is your name?",
"✔ Where do you live?"
],
questions:[
{
q:"___ is your name?",
o:["Who","What","Where"],
a:"What",
why:"নাম জানতে What ব্যবহার হয়"
}
]
},

prep:{
lesson:[
"📦 Preposition জায়গা বোঝায়",
"in = ভেতরে | on = উপর | under = নিচে"
],
examples:[
"✔ Cat is on the table",
"✔ Book is in the bag"
],
questions:[
{
q:"Cat is ___ the table",
o:["on","in","under"],
a:"on",
why:"টেবিলের উপর = on"
}
]
}
};

function load(topic){
state.topic=topic;
state.step=0;
render();
}

function render(){

let t=DATA[state.topic];
let app=document.getElementById("app");

let html="";

/* STEP 1: LESSON (VERY DETAILED) */
if(state.step===0){

html+=`<div class="lesson"><b>📘 Lesson (শেখা)</b><br><br>`;

t.lesson.forEach(l=>{
html+=`<div>${l}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Next: Rule</button>`;
}

/* STEP 2: RULE */
else if(state.step===1){

html+=`<div class="lesson"><b>📌 Rule (নিয়ম)</b><br><br>`;

if(t.rule){
t.rule.forEach(r=>{
html+=`<div>${r}</div>`;
});
}

html+=`</div>
<button onclick="next()">👉 Next: Examples</button>`;
}

/* STEP 3: EXTRA RULE (verb only) */
else if(state.step===2 && t.sRule){

html+=`<div class="lesson"><b>🧠 Detailed Rule</b><br><br>`;

t.sRule.forEach(r=>{
html+=`<div>${r}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Next: es Rule</button>`;
}

/* STEP 4: ES RULE (verb only) */
else if(state.step===3 && t.esRule){

html+=`<div class="lesson"><b>🧠 Advanced Rule</b><br><br>`;

t.esRule.forEach(r=>{
html+=`<div>${r}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Examples</button>`;
}

/* STEP 5: EXAMPLES */
else if(state.step>=4 || !t.sRule){

html+=`<div class="lesson"><b>📌 Examples</b><br><br>`;

t.examples.forEach(e=>{
html+=`<div>${e}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Start Practice</button>`;
}

/* QUESTIONS */
if(state.step>=5 || (!t.sRule && state.step===2)){

let q=t.questions[0];

html+=`
<h3>${q.q}</h3>
`;

q.o.forEach(opt=>{
html+=`
<button class="option" onclick="check('${opt}')">${opt}</button>
`;
});

html+=`<p id="fb"></p>`;
}

app.innerHTML=html;
}

function next(){
state.step++;
render();
}

function check(opt){

let q=DATA[state.topic].questions[0];

if(opt===q.a){
document.getElementById("fb").innerHTML=
`<span class="correct">✔ সঠিক!</span><br><br>
👉 ${q.why}`;
}
else{
document.getElementById("fb").innerHTML=
`<span class="wrong">❌ ভুল</span><br><br>
✔ সঠিক উত্তর: ${q.a}<br><br>
👉 ${q.why}`;
}

setTimeout(()=>{
state.step=5;
render();
},1200);
}

load("verb");

</script>

</body>
</html>
