<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilingual Duolingo Kids English</title>

<style>
body{
margin:0;
font-family: Arial;
background:#f5f7ff;
}

header{
background:#1e3a8a;
color:white;
text-align:center;
padding:15px;
}

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
background:#2563eb;
}

nav button{
margin:5px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#60a5fa;
color:white;
cursor:pointer;
font-weight:bold;
}

.container{
max-width:850px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:20px;
margin-top:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.block{
background:#fff7ed;
padding:12px;
border-left:5px solid #f59e0b;
margin-bottom:12px;
}

.option{
display:block;
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:10px;
background:#eee;
cursor:pointer;
font-size:16px;
}

.option:hover{background:#d1fae5;}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}

.small{
font-size:14px;
opacity:0.85;
}
</style>

</head>

<body>

<header>
<h2>🎓 Bilingual Duolingo Kids English</h2>
<p>English + বাংলা একসাথে শেখা (Line-by-Line)</p>
</header>

<nav>
<button onclick="load('verb')">Verb</button>
<button onclick="load('wh')">WH</button>
<button onclick="load('prep')">Preposition</button>
</nav>

<div class="container">
<div id="app" class="card"></div>
</div>

<script>

let state={
topic:"verb",
step:0
};

const DATA={

verb:{

lesson:[
"📘 Right Form of Verb means using correct verb form according to sentence.",
"📘 Right Form of Verb মানে হলো sentence অনুযায়ী verb-এর সঠিক রূপ ব্যবহার করা।",

"",
"👉 Verb is a word that shows action.",
"👉 Verb হলো এমন শব্দ যা কাজ বোঝায়।",

"play = to play a game",
"play = খেলা করা",

"go = to move somewhere",
"go = কোথাও যাওয়া",

"eat = to consume food",
"eat = খাবার খাওয়া"
],

rule:[
"He / She / It → verb + s/es",
"He / She / It → verb-এর সাথে s/es যোগ হয়",

"",
"📌 Why?",
"When subject is single person or thing, verb changes.",
"📌 কেন?",
"যখন একজন ব্যক্তি বা একটি জিনিস বোঝায়, তখন verb পরিবর্তিত হয়।"
],

examples:[
"✔ He goes to school",
"✔ He goes to school → সে স্কুলে যায়",

"✔ She reads books",
"✔ She reads books → সে বই পড়ে",

"✔ The cat eats fish",
"✔ The cat eats fish → বিড়াল মাছ খায়"
],

es_rule:[
"🔴 When to add 'es'?",
"If verb ends with s / sh / ch / x / o",
"🔴 কখন 'es' যোগ হয়?",

"",
"go → goes → যাওয়া",
"watch → watches → দেখা",
"wash → washes → ধোয়া",
"fix → fixes → ঠিক করা"
],

questions:[
{
q:"He ___ to school every day",
o:["go","goes","going"],
a:"goes",
why:"He is singular subject → verb + s/es → goes"
}
]
},

wh:{

lesson:[
"❓ WH Question is used to ask information",
"❓ WH Question ব্যবহার করা হয় তথ্য জানার জন্য",

"Who = person → মানুষ",
"What = thing → জিনিস",
"Where = place → জায়গা"
],

examples:[
"✔ What is your name?",
"✔ What is your name? → তোমার নাম কি?",

"✔ Where do you live?",
"✔ Where do you live? → তুমি কোথায় থাকো?"
],

questions:[
{
q:"___ is your name?",
o:["Who","What","Where"],
a:"What",
why:"Name জানতে What ব্যবহার করা হয়"
}
]
},

prep:{

lesson:[
"📦 Preposition shows position or place",
"📦 Preposition জায়গা বা অবস্থান বোঝায়",

"in = inside → ভেতরে",
"on = above → উপরে",
"under = below → নিচে"
],

examples:[
"✔ Cat is on the table",
"✔ Cat is on the table → বিড়াল টেবিলের উপর আছে",

"✔ Book is in the bag",
"✔ Book is in the bag → বই ব্যাগের ভিতরে আছে"
],

questions:[
{
q:"Cat is ___ the table",
o:["on","in","under"],
a:"on",
why:"on means surface → উপর"
}
]
}

};

function load(topic){
state.topic=topic;
state.step=0;
render();
}

function render(){

let t=DATA[state.topic];
let app=document.getElementById("app");

let html="";

/* STEP 1: LESSON */
if(state.step===0){

html+=`<div class="block"><b>📘 Lesson (English + বাংলা)</b><br><br>`;

t.lesson.forEach(l=>{
html+=`<div>${l}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Next</button>`;
}

/* STEP 2: RULE */
else if(state.step===1 && t.rule){

html+=`<div class="block"><b>📌 Rule (নিয়ম)</b><br><br>`;

t.rule.forEach(r=>{
html+=`<div>${r}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Next</button>`;
}

/* STEP 3: EXTRA RULE */
else if(state.step===2 && t.es_rule){

html+=`<div class="block"><b>🧠 Advanced Rule</b><br><br>`;

t.es_rule.forEach(r=>{
html+=`<div>${r}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Next</button>`;
}

/* STEP 4: EXAMPLES */
else if(state.step>=3){

html+=`<div class="block"><b>📌 Examples (English + বাংলা)</b><br><br>`;

t.examples.forEach(e=>{
html+=`<div>${e}</div>`;
});

html+=`</div>
<button onclick="next()">👉 Practice</button>`;
}

/* QUESTIONS */
if(state.step>=4){

let q=t.questions[0];

html+=`
<h3>${q.q}</h3>
`;

q.o.forEach(opt=>{
html+=`
<button class="option" onclick="check('${opt}')">${opt}</button>
`;
});

html+=`<p id="fb"></p>`;
}

app.innerHTML=html;
}

function next(){
state.step++;
render();
}

function check(opt){

let q=DATA[state.topic].questions[0];

if(opt===q.a){
document.getElementById("fb").innerHTML=
`<span class="correct">✔ Correct</span><br><br>
👉 ${q.why}`;
}
else{
document.getElementById("fb").innerHTML=
`<span class="wrong">❌ Wrong</span><br><br>
✔ Correct Answer: ${q.a}<br><br>
👉 ${q.why}`;
}

setTimeout(()=>{
state.step=4;
render();
},1200);
}

load("verb");

</script>

</body>
</html>
